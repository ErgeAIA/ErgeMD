name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install dependencies
        run: pnpm install

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0.5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'ErgeMD ${{ github.ref_name }}'
          releaseBody: 'See the assets to download and install this version.'
          releaseDraft: false
          prerelease: false
          includeRelease: true
          includeUpdaterJson: true

      - name: Create portable package
        shell: pwsh
        run: |
          $src = "src-tauri/target/release"
          $dst = "ErgeMD-portable"
          New-Item -ItemType Directory -Force -Path $dst
          Copy-Item "$src/ErgeMD.exe" $dst/
          Copy-Item "$src/*.dll" $dst/ -ErrorAction SilentlyContinue
          if (Test-Path "$src/WebView2Loader.dll") {
            Copy-Item "$src/WebView2Loader.dll" $dst/
          }
          Compress-Archive -Path $dst -DestinationPath "ErgeMD-${{ github.ref_name }}-portable.zip" -Force

      - name: Upload portable package to release
        uses: softprops/action-gh-release@v1
        with:
          files: ErgeMD-${{ github.ref_name }}-portable.zip
          tag_name: ${{ github.ref_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
